# yamllint disable rule:line-length
# Use template from https://github.com/honestbank/workflows/tree/main/examples/repository-workflows
---
name: "repository-secrets-check"
permissions:
  contents: read
  pull-requests: write

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - test
      - dev
      - qa
      - prod
      - main
  push:
    branches:
      - test
      - dev
      - qa
      - prod
      - main

jobs:
  repository-secrets-check:
    name: repository-secrets-check
    uses: honestbank/workflows/.github/workflows/shared-gitleaks.yaml@main
    secrets: inherit
