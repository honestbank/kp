---
name: repository-secrets-check

# Public-repo variant of repository-secrets-check.yaml.
# Public repos cannot call reusable workflows from the private honestbank/workflows repo,
# so we inline the gitleaks scan here. The workflow `name:` plus the job id `shared-gitleaks`
# together produce the GitHub status-check context `repository-secrets-check / shared-gitleaks`,
# matching CONST_BRANCH_PROTECTION_CHECK_NAME_GITLEAKS in honestbank/terraform-code-infrastructure.

permissions:
  contents: read
  pull-requests: write

on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  shared-gitleaks:
    name: "repository-secrets-check / shared-gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.ENGINEERING_GITHUB_PERSONAL_ACCESS_TOKEN }}

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
